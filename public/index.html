<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSA Photo Portal</title>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: radial-gradient(circle at top, #1e293b, #020617);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
  }

  .card {
    width: 340px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-radius: 20px;
    padding: 28px;
    text-align: center;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .logo { width: 100px; margin-bottom: 10px; }
  h2 { margin-bottom: 15px; font-weight: 500; letter-spacing: -0.5px; }

  input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    margin-bottom: 10px;
    font-size: 15px;
    background: rgba(0,0,0,0.2);
    color: white;
    box-sizing: border-box;
  }

  .name { font-size: 14px; margin-bottom: 12px; color: #38bdf8; min-height: 20px; }
  .error { color: #f87171; }
  .success { color: #4ade80; }

  .otp-container {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 10px 0 15px;
  }

  .otp-box {
    width: 48px;
    height: 55px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
    border-radius: 10px;
    border: none;
    background: white;
    color: #020617;
  }

  button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg,#3b82f6,#2563eb);
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
    margin-bottom: 8px;
  }

  button:hover:not(:disabled) { transform: scale(1.02); filter: brightness(1.1); }
  button:disabled { background: #475569; cursor: not-allowed; opacity: 0.7; }

  #resendBtn { background: transparent; border: 1px solid rgba(255,255,255,0.2); font-size: 13px; }

  .footer { margin-top: 12px; font-size: 11px; opacity: 0.5; }
  .hidden { display: none; }
</style>
</head>
<body>

<div class="card">
  <img class="logo" src="https://static.wixstatic.com/media/267f11_77128206e0c0489eb10785a4157d7504~mv2.png" alt="Logo">
  <h2>Student Portal</h2>

  <input type="tel" id="phone" placeholder="Enter Mobile Number" maxlength="10">

  <div id="message" class="name"></div>

  <div id="otpSection" class="hidden">
    <div class="otp-container">
      <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
      <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
      <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
      <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
    </div>
    <button onclick="verifyOTP()">Verify Access</button>
    <button id="resendBtn" disabled onclick="resendOTP()">Resend OTP</button>
  </div>

  <div class="footer">Secure encrypted access</div>
</div>

<script>
let currentPhone = "";
let resendTimer = 60;
let resendInterval;
let otpSent = false;
let checkTimeout;

const phoneInput = document.getElementById("phone");
const otpBoxes = document.querySelectorAll(".otp-box");

// 🔹 Debounced phone check
phoneInput.addEventListener('input', () => {
  clearTimeout(checkTimeout);
  setMessage(""); // Clear error while typing
  
  checkTimeout = setTimeout(() => {
    let phone = phoneInput.value.trim();
    if (phone.length === 10) autoCheck(phone);
  }, 500); 
});

async function autoCheck(phone) {
  currentPhone = phone;
  try {
    let res = await fetch("/get-student", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ phone })
    });

    if (res.ok) {
      let data = await res.json();
      let masked = phone.replace(/(\d{2})\d{6}(\d{2})/, "$1******$2");
      setMessage("Welcome, " + data.name + " (" + masked + ")");
      
      if (!otpSent) {
        sendOTP();
        otpSent = true;
      }
    } else {
      setMessage("Number not registered", "error");
    }
  } catch (e) {
    setMessage("Connection error", "error");
  }
}

async function sendOTP() {
  let res = await fetch("/send-otp", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ phone: currentPhone })
  });

  if (res.ok) {
    document.getElementById("otpSection").classList.remove("hidden");
    otpBoxes[0].focus();
    startTimer();
  } else {
    setMessage("Failed to send OTP", "error");
  }
}

function startTimer() {
  clearInterval(resendInterval);
  resendTimer = 60;
  const btn = document.getElementById("resendBtn");
  btn.disabled = true;

  resendInterval = setInterval(() => {
    resendTimer--;
    btn.innerText = `Resend in ${resendTimer}s`;
    if (resendTimer <= 0) {
      clearInterval(resendInterval);
      btn.disabled = false;
      btn.innerText = "Resend OTP";
    }
  }, 1000);
}

async function resendOTP() {
  if (resendTimer > 0) return;
  await sendOTP();
}

// 🔹 Enhanced OTP UX (Pasting & Navigation)
otpBoxes.forEach((input, i) => {
  input.addEventListener("input", (e) => {
    if (e.inputType === "insertFromPaste") return; // Handled by paste listener
    if (input.value && otpBoxes[i + 1]) otpBoxes[i + 1].focus();
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Backspace" && !input.value && otpBoxes[i - 1]) otpBoxes[i - 1].focus();
    if (e.key === "Enter") verifyOTP();
  });

  input.addEventListener("paste", (e) => {
    const data = e.clipboardData.getData("text").trim();
    if (data.length === 4 && !isNaN(data)) {
      data.split("").forEach((char, index) => {
        if (otpBoxes[index]) otpBoxes[index].value = char;
      });
      otpBoxes[3].focus();
    }
  });
});

async function verifyOTP() {
  let otp = "";
  otpBoxes.forEach(i => otp += i.value);
  
  if(otp.length < 4) return setMessage("Enter full code", "error");

  let res = await fetch("/verify-otp", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ phone: currentPhone, otp })
  });

  let data = await res.json();

  if (data.success) {
    setMessage("Access Granted ✓", "success");
    setTimeout(() => { window.location.href = data.link; }, 1000);
  } else {
    setMessage("Invalid OTP", "error");
    otpBoxes.forEach(i => i.value = "");
    otpBoxes[0].focus();
  }
}

function setMessage(msg, type="") {
  let el = document.getElementById("message");
  el.innerText = msg;
  el.className = "name " + type;
}
</script>

</body>
</html>
