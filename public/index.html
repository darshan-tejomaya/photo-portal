<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSA Student Portal | Secure Access</title>

<style>
  :root {
    /* Fluid colors based on system theme */
    --bg-color: #020617;
    --card-bg: rgba(255, 255, 255, 0.05);
    --text-main: #ffffff;
    --text-muted: #94a3b8;
    --primary: #6366f1;
    --accent: #38bdf8;
    --error: #fb7185;
    --success: #34d399;
  }

  /* Light Mode Overrides */
  @media (prefers-color-scheme: light) {
    :root {
      --bg-color: #f8fafc;
      --card-bg: rgba(255, 255, 255, 0.8);
      --text-main: #0f172a;
      --text-muted: #64748b;
      --primary: #4f46e5;
    }
  }

  body {
    margin: 0;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg-color);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-main);
    transition: background 0.3s ease;
  }

  .card {
    width: 100%;
    max-width: 380px;
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 40px;
    text-align: center;
    box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .logo { width: 80px; margin-bottom: 20px; }
  h1 { font-size: 1.5rem; margin-bottom: 8px; }
  p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 24px; }

  /* Accessible Inputs */
  .input-group { text-align: left; margin-bottom: 15px; }
  label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: var(--text-muted); font-weight: 500; }

  input {
    width: 100%;
    padding: 12px 16px;
    border-radius: 12px;
    border: 2px solid rgba(255, 255, 255, 0.1);
    background: rgba(0, 0, 0, 0.05);
    color: var(--text-main);
    font-size: 1rem;
    box-sizing: border-box;
    outline: none;
    transition: all 0.2s;
  }

  input:focus { border-color: var(--primary); ring: 4px var(--primary); }

  /* OTP Boxes */
  .otp-container { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
  .otp-box { width: 50px; height: 60px; text-align: center; font-size: 1.5rem; font-weight: bold; }

  button {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: var(--primary);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
  }

  button:hover { opacity: 0.9; }
  button:active { transform: scale(0.98); }
  button:disabled { background: #64748b; cursor: not-allowed; }

  .hidden { display: none; }
  
  /* Success View */
  #successView { animation: fadeIn 0.5s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

  <div class="card" id="authCard">
    <div id="loginView">
      <img class="logo" src="https://static.wixstatic.com/media/267f11_77128206e0c0489eb10785a4157d7504~mv2.png" alt="CSA Logo">
      <h1>Student Portal</h1>
      <p>Enter your phone to access photos</p>

      <div class="input-group">
        <label for="phone">Mobile Number</label>
        <input type="tel" id="phone" autocomplete="tel" aria-label="Mobile Number" placeholder="10-digit number">
      </div>
      
      <div id="msg" style="font-size: 13px; margin-bottom: 10px;"></div>

      <div id="otpWrapper" class="hidden">
        <label>Verification Code</label>
        <div class="otp-container">
          <input class="otp-box" maxlength="1" type="text" inputmode="numeric" aria-label="OTP Digit 1">
          <input class="otp-box" maxlength="1" type="text" inputmode="numeric" aria-label="OTP Digit 2">
          <input class="otp-box" maxlength="1" type="text" inputmode="numeric" aria-label="OTP Digit 3">
          <input class="otp-box" maxlength="1" type="text" inputmode="numeric" aria-label="OTP Digit 4">
        </div>
        <button id="verifyBtn" onclick="handleVerify()">Verify & Continue</button>
      </div>
    </div>

    <div id="successView" class="hidden">
      <h2 id="welcomeUser">Welcome back!</h2>
      <p>You are securely logged in.</p>
      <button onclick="window.location.href='/gallery'" style="margin-bottom: 10px;">View My Photos</button>
      <button onclick="handleLogout()" style="background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted);">Logout</button>
    </div>
  </div>

<script>
  // --- SESSION MANAGEMENT ---
  const SESSION_KEY = "csa_user_session";

  window.onload = () => {
    const session = JSON.parse(localStorage.getItem(SESSION_KEY));
    if (session && session.expiry > Date.now()) {
      showSuccess(session.name);
    }
  };

  function createSession(name) {
    const sessionData = {
      name: name,
      expiry: Date.now() + (24 * 60 * 60 * 1000) // 24 Hours
    };
    localStorage.setItem(SESSION_KEY, JSON.stringify(sessionData));
  }

  function handleLogout() {
    localStorage.removeItem(SESSION_KEY);
    location.reload();
  }

  // --- UI LOGIC ---
  const phoneInput = document.getElementById('phone');
  const otpWrapper = document.getElementById('otpWrapper');
  const otpBoxes = document.querySelectorAll('.otp-box');

  phoneInput.addEventListener('input', (e) => {
    if (e.target.value.length === 10) {
      // Mock API call
      document.getElementById('msg').innerHTML = "Check your SMS for a code";
      otpWrapper.classList.remove('hidden');
      otpBoxes[0].focus();
    }
  });

  // OTP Box Navigation (Global Standard UX)
  otpBoxes.forEach((box, i) => {
    box.addEventListener('input', () => {
      if (box.value && otpBoxes[i+1]) otpBoxes[i+1].focus();
      if (Array.from(otpBoxes).every(b => b.value)) handleVerify();
    });
    box.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !box.value && otpBoxes[i-1]) otpBoxes[i-1].focus();
    });
  });

  async function handleVerify() {
    const code = Array.from(otpBoxes).map(b => b.value).join('');
    if (code.length < 4) return;

    // Simulate API verification
    const verifyBtn = document.getElementById('verifyBtn');
    verifyBtn.disabled = true;
    verifyBtn.innerText = "Authenticating...";

    setTimeout(() => {
      createSession("Student"); // In reality, use name from your database
      showSuccess("Student");
    }, 1000);
  }

  function showSuccess(name) {
    document.getElementById('loginView').classList.add('hidden');
    document.getElementById('successView').classList.remove('hidden');
    document.getElementById('welcomeUser').innerText = `Welcome, ${name}!`;
  }
</script>
</body>
</html>
