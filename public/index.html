<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSA Photo Portal | Secure Access</title>

<style>
  :root {
    --primary: #3b82f6;
    --accent: #38bdf8;
    --error: #f87171;
    --success: #4ade80;
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: radial-gradient(circle at top, #1e293b, #020617);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    overflow: hidden;
  }

  .card {
    width: 350px;
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 32px;
    text-align: center;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: transform 0.3s ease;
  }

  .shake { animation: shake 0.4s ease-in-out; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }

  .logo { width: 90px; margin-bottom: 12px; filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.3)); }
  h2 { margin: 0 0 20px; font-weight: 600; letter-spacing: -0.5px; font-size: 1.5rem; }

  input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    margin-bottom: 10px;
    font-size: 16px;
    background: rgba(0, 0, 0, 0.2);
    color: white;
    box-sizing: border-box;
    outline: none;
    transition: border 0.2s;
  }
  input:focus { border-color: var(--accent); }

  .message-area { min-height: 20px; margin-bottom: 15px; font-size: 14px; transition: 0.3s; }
  .name { color: var(--accent); }
  .error { color: var(--error); font-weight: 500; }
  .success { color: var(--success); font-weight: 500; }

  .otp-container {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin: 10px 0 20px;
  }

  .otp-box {
    width: 50px;
    height: 55px;
    text-align: center;
    font-size: 24px;
    font-weight: 700;
    border-radius: 12px;
    border: 2px solid transparent;
    background: white;
    color: #0f172a;
    transition: all 0.2s;
  }
  .otp-box:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(56, 189, 248, 0.4); }

  button {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
  }
  button:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }
  button:active:not(:disabled) { transform: translateY(0); }
  button:disabled { background: #475569; cursor: not-allowed; opacity: 0.6; }

  #resendBtn {
    background: none;
    border: 1px solid rgba(255,255,255,0.1);
    margin-top: 10px;
    font-size: 13px;
    color: #94a3b8;
  }

  .footer { margin-top: 20px; font-size: 11px; opacity: 0.4; letter-spacing: 0.5px; }
  .hidden { display: none; opacity: 0; transform: translateY(10px); }
  .show { display: block; opacity: 1; transform: translateY(0); transition: 0.4s ease-out; }
</style>
</head>
<body>

<div class="card" id="mainCard">
  <img class="logo" src="https://static.wixstatic.com/media/267f11_77128206e0c0489eb10785a4157d7504~mv2.png" alt="CSA Logo">
  <h2>Student Portal</h2>

  <input type="tel" id="phone" placeholder="Enter Mobile Number" maxlength="10" inputmode="numeric" autocomplete="tel">

  <div id="message" class="message-area"></div>

  <div id="otpSection" class="hidden">
    <div class="otp-container">
      <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
      <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
      <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
      <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
    </div>
    <button id="verifyBtn" onclick="verifyOTP()">Verify & Enter</button>
    <button id="resendBtn" disabled onclick="resendOTP()">Resend OTP in 60s</button>
  </div>

  <div class="footer">AUTHENTICATED ACCESS ONLY</div>
</div>

<script>
let currentPhone = "";
let resendInterval;
let otpSent = false;
let debounceTimer;

const phoneInput = document.getElementById("phone");
const otpBoxes = document.querySelectorAll(".otp-box");
const card = document.getElementById("mainCard");

// 🔹 Debounced Input (Prevents spamming server while typing)
phoneInput.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  const val = phoneInput.value.replace(/\D/g, ''); // Remove non-digits
  phoneInput.value = val;
  
  setMessage(""); // Clear errors while typing

  if (val.length === 10) {
    debounceTimer = setTimeout(() => autoCheck(val), 600);
  }
});

async function autoCheck(phone) {
  currentPhone = phone;
  try {
    let res = await fetch("/get-student", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ phone })
    });

    if (res.ok) {
      let data = await res.json();
      let masked = phone.replace(/(\d{2})\d{6}(\d{2})/, "$1******$2");
      setMessage(`Welcome, ${data.name} (${masked})`, "name");
      
      if (!otpSent) sendOTP();
    } else {
      setMessage("Number not registered", "error");
      triggerShake();
    }
  } catch (e) {
    setMessage("Connection lost. Try again.", "error");
  }
}

async function sendOTP() {
  otpSent = true;
  let res = await fetch("/send-otp", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ phone: currentPhone })
  });

  if (res.ok) {
    const section = document.getElementById("otpSection");
    section.classList.remove("hidden");
    section.classList.add("show");
    otpBoxes[0].focus();
    startTimer();
  } else {
    otpSent = false; // Allow retry
    setMessage("Failed to send OTP", "error");
  }
}

function startTimer() {
  clearInterval(resendInterval);
  let time = 60;
  const btn = document.getElementById("resendBtn");
  btn.disabled = true;

  resendInterval = setInterval(() => {
    time--;
    btn.innerText = `Resend OTP in ${time}s`;
    if (time <= 0) {
      clearInterval(resendInterval);
      btn.disabled = false;
      btn.innerText = "Resend OTP Now";
    }
  }, 1000);
}

async function resendOTP() {
  if (resendTimer > 0) return;
  await sendOTP();
}

// 🔹 Enhanced OTP UX (Navigation & Paste)
otpBoxes.forEach((input, i) => {
  input.addEventListener("input", (e) => {
    // If value is added, move to next
    if (input.value && otpBoxes[i + 1]) otpBoxes[i + 1].focus();
  });

  input.addEventListener("keydown", (e) => {
    // Backspace: move to previous
    if (e.key === "Backspace" && !input.value && otpBoxes[i - 1]) {
      otpBoxes[i - 1].focus();
    }
    if (e.key === "Enter") verifyOTP();
  });

  // Handle Paste (Huge UX win)
  input.addEventListener("paste", (e) => {
    e.preventDefault();
    const pastedData = e.clipboardData.getData("text").slice(0, 4).split("");
    pastedData.forEach((char, index) => {
      if (otpBoxes[index]) otpBoxes[index].value = char;
    });
    if (pastedData.length > 0) verifyOTP();
  });
});

async function verifyOTP() {
  let otp = "";
  otpBoxes.forEach(i => otp += i.value);
  
  if(otp.length < 4) return;

  const btn = document.getElementById("verifyBtn");
  btn.innerText = "Verifying...";
  btn.disabled = true;

  try {
    let res = await fetch("/verify-otp", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ phone: currentPhone, otp })
    });

    let data = await res.json();

    if (data.success) {
      setMessage("Access Granted ✓", "success");
      setTimeout(() => { window.location.href = data.link; }, 1000);
    } else {
      setMessage("Invalid OTP. Try again.", "error");
      triggerShake();
      btn.innerText = "Verify & Enter";
      btn.disabled = false;
      otpBoxes.forEach(box => box.value = "");
      otpBoxes[0].focus();
    }
  } catch (e) {
    btn.disabled = false;
    btn.innerText = "Verify & Enter";
  }
}

function setMessage(msg, type="") {
  let el = document.getElementById("message");
  el.innerText = msg;
  el.className = "message-area " + type;
}

function triggerShake() {
  card.classList.add("shake");
  setTimeout(() => card.classList.remove("shake"), 400);
}
</script>

</body>
</html>
