<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chaitanya Shree Academy | Student Access</title>
    <style>
        :root {
            --csa-blue: #004a99;
            --csa-accent: #e2e8f0;
            --text-main: #1e293b;
            --error: #e11d48;
            --success: #10b981;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: row;
        }

        /* --- SECTION 1: VISUAL BRANDING --- */
        .brand-section {
            flex: 1.2;
            background: linear-gradient(rgba(0, 74, 153, 0.8), rgba(0, 74, 153, 0.8)), 
                        url('https://images.unsplash.com/photo-1523050853021-ebd61390d78e?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 40px;
        }

        .brand-logo {
            width: 120px;
            background: white;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .brand-section h1 {
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            margin: 0;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .brand-section p {
            font-size: 1rem;
            opacity: 0.9;
            max-width: 400px;
            line-height: 1.6;
            margin-top: 15px;
        }

        /* --- SECTION 2: LOGIN PORTAL --- */
        .login-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8fafc;
            padding: 20px;
            position: relative;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: clamp(30px, 8vw, 50px);
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--csa-accent);
        }

        .hp { position: absolute; left: -5000px; top: -5000px; }

        h2 {
            font-size: 1.5rem;
            color: var(--csa-blue);
            margin: 0 0 10px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #475569;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="tel"], input[type="text"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px; /* Prevents iOS auto-zoom */
            box-sizing: border-box;
            transition: all 0.3s ease;
            appearance: none;
        }

        input:focus {
            outline: none;
            border-color: var(--csa-blue);
            background: #f0f7ff;
        }

        .message-area {
            min-height: 24px;
            font-size: 13px;
            margin-bottom: 15px;
            font-weight: 500;
        }
        .error { color: var(--error); }
        .success { color: var(--success); }
        .name { color: var(--csa-blue); font-weight: bold; }

        .otp-grid {
            display: flex;
            gap: clamp(8px, 2vw, 15px);
            margin-bottom: 25px;
        }

        .otp-input {
            width: 100%;
            height: clamp(50px, 12vw, 65px);
            text-align: center;
            font-size: 24px;
            font-weight: 800;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            background: #fff;
            color: var(--csa-blue);
        }

        button {
            width: 100%;
            padding: 16px;
            background: var(--csa-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }

        button:active { transform: scale(0.98); }

        #resendBtn {
            background: none;
            color: #94a3b8;
            font-size: 12px;
            margin-top: 15px;
            text-decoration: underline;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 10px;
            color: #94a3b8;
            text-align: center;
            width: 100%;
            left: 0;
        }

        .hidden { display: none; }

        /* --- MOBILE MEDIA QUERIES --- */
        @media (max-width: 850px) {
            body {
                flex-direction: column;
                overflow-y: auto;
            }

            .brand-section {
                flex: none;
                height: 35vh; /* Takes top portion of screen */
                padding: 20px;
            }

            .brand-logo {
                width: 80px;
                margin-bottom: 10px;
            }

            .brand-section p {
                display: none; /* Hide description on mobile to save space */
            }

            .login-section {
                flex: 1;
                padding: 30px 15px 80px; /* Space for footer */
                align-items: flex-start;
            }

            .login-box {
                max-width: 100%;
                border: none;
                box-shadow: none;
                background: transparent;
                padding: 0;
            }
        }

        @media (max-height: 700px) and (max-width: 850px) {
            .brand-section { height: 25vh; }
        }

        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
    </style>
</head>
<body>

    <div class="brand-section">
        <img class="brand-logo" src="https://static.wixstatic.com/media/267f11_77128206e0c0489eb10785a4157d7504~mv2.png" alt="CSA Logo">
        <h1>Chaitanya Shree Academy</h1>
        <p>The digital gateway for students at Chaitanya Shree Academy.</p>
    </div>

    <div class="login-section">
        <input type="text" class="hp" id="honeypot" tabindex="-1" autocomplete="off">
        
        <div class="login-box" id="card">
            <h2>Sign In</h2>
            <p class="subtitle">Access your portal with Registered Mobile Number</p>

            <div class="input-group">
                <label>Mobile Number</label>
                <input type="tel" id="phone" placeholder="98XXXXXXXX" maxlength="10" inputmode="numeric">
            </div>

            <div id="message" class="message-area"></div>

            <div id="otpSection" class="hidden">
                <label>4-Digit OTP</label>
                <div class="otp-grid">
                    <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
                    <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
                    <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
                    <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
                </div>
                <button id="verifyBtn" onclick="verifyOTP()">Verify Identity</button>
                <button id="resendBtn" disabled onclick="resendOTP()">Resend code in 60s</button>
            </div>
        </div>

        <div class="footer">
            &copy; 2026 CSA Malur. Powered by Chaitanya Shree Academy.
        </div>
    </div>

<script>
    /* JavaScript logic remains the same as previous version to ensure
       backend connectivity (fetch calls, OTP navigation, etc.)
    */
    let currentPhone = "";
    let resendInterval;
    let otpSent = false;
    let debounceTimer;

    const phoneInput = document.getElementById("phone");
    const otpBoxes = document.querySelectorAll(".otp-input");
    const card = document.getElementById("card");

    phoneInput.addEventListener('input', () => {
        clearTimeout(debounceTimer);
        const val = phoneInput.value.replace(/\D/g, ''); 
        phoneInput.value = val;
        setMessage("");
        if (val.length === 10) {
            debounceTimer = setTimeout(() => {
                if(document.getElementById("honeypot").value !== "") return;
                autoCheck(val);
            }, 600);
        }
    });

    async function autoCheck(phone) {
        currentPhone = phone;
        try {
            let res = await fetch("/get-student", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ phone })
            });
            if (res.ok) {
                let data = await res.json();
                setMessage(`Welcome, ${data.name}`, "name");
                if (!otpSent) sendOTP();
            } else {
                setMessage("Number not registered", "error");
                triggerShake();
            }
        } catch (e) { setMessage("Network error", "error"); }
    }

    async function sendOTP() {
        otpSent = true;
        let res = await fetch("/send-otp", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ phone: currentPhone })
        });
        if (res.ok) {
            document.getElementById("otpSection").classList.remove("hidden");
            otpBoxes[0].focus();
            startTimer();
        }
    }

    function startTimer() {
        clearInterval(resendInterval);
        let time = 60;
        const btn = document.getElementById("resendBtn");
        resendInterval = setInterval(() => {
            time--;
            btn.innerText = `Resend in ${time}s`;
            if (time <= 0) {
                clearInterval(resendInterval);
                btn.disabled = false;
                btn.innerText = "Resend OTP";
            }
        }, 1000);
    }

    otpBoxes.forEach((input, i) => {
        input.addEventListener("input", () => {
            if (input.value && otpBoxes[i + 1]) otpBoxes[i + 1].focus();
            const allFilled = Array.from(otpBoxes).every(box => box.value.length === 1);
            if (allFilled) verifyOTP();
        });
        input.addEventListener("keydown", (e) => {
            if (e.key === "Backspace" && !input.value && otpBoxes[i - 1]) otpBoxes[i - 1].focus();
        });
    });

    async function verifyOTP() {
        let otp = "";
        otpBoxes.forEach(i => otp += i.value);
        if(otp.length < 4) return;
        const btn = document.getElementById("verifyBtn");
        btn.innerText = "Verifying...";
        btn.disabled = true;
        try {
            let res = await fetch("/verify-otp", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ phone: currentPhone, otp })
            });
            let data = await res.json();
            if (data.success) {
                setMessage("Verified ✓", "success");
                setTimeout(() => { window.location.href = data.link; }, 800);
            } else {
                setMessage("Invalid OTP", "error");
                triggerShake();
                btn.innerText = "Verify Identity";
                btn.disabled = false;
                otpBoxes.forEach(b => b.value = "");
                otpBoxes[0].focus();
            }
        } catch (e) { btn.disabled = false; }
    }

    function resendOTP() { otpSent = false; sendOTP(); }
    function setMessage(msg, type="") {
        const el = document.getElementById("message");
        el.innerText = msg;
        el.className = "message-area " + type;
    }
    function triggerShake() {
        card.classList.add("shake");
        setTimeout(() => card.classList.remove("shake"), 400);
    }
</script>
</body>
</html>
