<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSI Student Portal | Secure Login</title>
    <style>
        :root {
            --dsi-blue: #004a99;
            --dsi-bg: #f5f8fa;
            --dsi-border: #e2e8f0;
            --text-main: #334155;
            --error: #ef4444;
            --success: #10b981;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--dsi-bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 380px;
            background: white;
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border-top: 4px solid var(--dsi-blue);
            padding: 40px 30px;
            text-align: center;
            position: relative;
        }

        /* Anti-Bot Honeypot */
        .hp { position: absolute; left: -5000px; top: -5000px; }

        .logo {
            width: 200px;
            margin-bottom: 25px;
        }

        h2 {
            font-size: 18px;
            color: var(--dsi-blue);
            font-weight: 600;
            margin: 0 0 5px;
            text-transform: uppercase;
        }

        p {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 30px;
        }

        .input-wrapper {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #475569;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        input[type="tel"], input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--dsi-border);
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
            background: #fff;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--dsi-blue);
        }

        .message-area {
            min-height: 20px;
            margin-bottom: 15px;
            font-size: 13px;
        }

        .error { color: var(--error); }
        .success { color: var(--success); }
        .name { color: var(--dsi-blue); font-weight: bold; }

        .otp-row {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin: 15px 0 25px;
        }

        .otp-box {
            width: 23%;
            height: 50px;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            border: 1px solid var(--dsi-border);
            border-radius: 4px;
            background: #f8fafc;
        }

        button {
            width: 100%;
            padding: 13px;
            background-color: var(--dsi-blue);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background-color: #003a7a; }
        button:disabled { background-color: #94a3b8; cursor: not-allowed; }

        #resendBtn {
            background: none;
            color: #94a3b8;
            font-size: 11px;
            margin-top: 10px;
            font-weight: normal;
        }

        .footer {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px solid #f1f5f9;
            font-size: 10px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .hidden { display: none; }
        
        .shake { animation: shake 0.3s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
    </style>
</head>
<body>

<div class="login-card" id="card">
    <input type="text" class="hp" id="honeypot" tabindex="-1" autocomplete="off">
    
    <img class="logo" src="https://static.wixstatic.com/media/267f11_77128206e0c0489eb10785a4157d7504~mv2.png" alt="DSI Logo">
    
    <h2>Student Login</h2>
    <p>Authentication Portal</p>

    <div class="input-wrapper">
        <label>Mobile Number</label>
        <input type="tel" id="phone" placeholder="Enter 10 digit number" maxlength="10" inputmode="numeric">
    </div>

    <div id="message" class="message-area"></div>

    <div id="otpSection" class="hidden">
        <label>Enter 4-Digit Code</label>
        <div class="otp-row">
            <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
            <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
            <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
            <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
        </div>
        <button id="verifyBtn" onclick="verifyOTP()">VERIFY & LOGIN</button>
        <button id="resendBtn" disabled onclick="resendOTP()">Resend in 60s</button>
    </div>

    <div class="footer">
        &copy; 2026 Dayananda Sagar Institutions <br>
        Secured Access Portal
    </div>
</div>

<script>
    let currentPhone = "";
    let resendInterval;
    let otpSent = false;
    let debounceTimer;

    const phoneInput = document.getElementById("phone");
    const otpBoxes = document.querySelectorAll(".otp-box");
    const card = document.getElementById("card");

    // WebOTP API Implementation
    if ('OTPCredential' in window) {
        window.addEventListener('DOMContentLoaded', e => {
            const ac = new AbortController();
            navigator.credentials.get({
                otp: { transport:['sms'] },
                signal: ac.signal
            }).then(otp => {
                const code = otp.code;
                code.split('').forEach((char, i) => { if(otpBoxes[i]) otpBoxes[i].value = char; });
                verifyOTP();
            }).catch(err => console.log(err));
        });
    }

    // Phone Input Logic
    phoneInput.addEventListener('input', () => {
        clearTimeout(debounceTimer);
        const val = phoneInput.value.replace(/\D/g, ''); 
        phoneInput.value = val;
        setMessage("");

        if (val.length === 10) {
            debounceTimer = setTimeout(() => {
                if(document.getElementById("honeypot").value !== "") return;
                autoCheck(val);
            }, 600);
        }
    });

    async function autoCheck(phone) {
        currentPhone = phone;
        try {
            let res = await fetch("/get-student", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ phone })
            });

            if (res.ok) {
                let data = await res.json();
                setMessage(`Welcome, ${data.name}`, "name");
                if (!otpSent) sendOTP();
            } else {
                setMessage("Student record not found", "error");
                triggerShake();
            }
        } catch (e) {
            setMessage("Server unreachable", "error");
        }
    }

    async function sendOTP() {
        otpSent = true;
        let res = await fetch("/send-otp", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ phone: currentPhone })
        });

        if (res.ok) {
            document.getElementById("otpSection").classList.remove("hidden");
            otpBoxes[0].focus();
            startTimer();
        }
    }

    function startTimer() {
        clearInterval(resendInterval);
        let time = 60;
        const btn = document.getElementById("resendBtn");
        resendInterval = setInterval(() => {
            time--;
            btn.innerText = `Resend code in ${time}s`;
            if (time <= 0) {
                clearInterval(resendInterval);
                btn.disabled = false;
                btn.innerText = "Resend OTP";
            }
        }, 1000);
    }

    // OTP Box Navigation
    otpBoxes.forEach((input, i) => {
        input.addEventListener("input", () => {
            if (input.value && otpBoxes[i + 1]) otpBoxes[i + 1].focus();
            const allFilled = Array.from(otpBoxes).every(box => box.value.length === 1);
            if (allFilled) verifyOTP();
        });
        input.addEventListener("keydown", (e) => {
            if (e.key === "Backspace" && !input.value && otpBoxes[i - 1]) otpBoxes[i - 1].focus();
        });
    });

    async function verifyOTP() {
        let otp = "";
        otpBoxes.forEach(i => otp += i.value);
        if(otp.length < 4) return;

        const btn = document.getElementById("verifyBtn");
        btn.innerText = "AUTHENTICATING...";
        btn.disabled = true;

        try {
            let res = await fetch("/verify-otp", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ phone: currentPhone, otp })
            });
            let data = await res.json();

            if (data.success) {
                setMessage("Verified ✓", "success");
                setTimeout(() => { window.location.href = data.link; }, 800);
            } else {
                setMessage("Invalid OTP code", "error");
                triggerShake();
                btn.innerText = "VERIFY & LOGIN";
                btn.disabled = false;
                otpBoxes.forEach(b => b.value = "");
                otpBoxes[0].focus();
            }
        } catch (e) {
            btn.disabled = false;
        }
    }

    function resendOTP() {
        otpSent = false;
        sendOTP();
    }

    function setMessage(msg, type="") {
        const el = document.getElementById("message");
        el.innerText = msg;
        el.className = "message-area " + type;
    }

    function triggerShake() {
        card.classList.add("shake");
        setTimeout(() => card.classList.remove("shake"), 300);
    }
</script>

</body>
</html>
