<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student UMS Portal | Secure Login</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --dsi-navy: #1a237e;
    --dsi-gold: #ffd700;
    --border-color: #e0e0e0;
    --text-dark: #333;
    --text-light: #757575;
  }

  body {
    margin: 0;
    padding: 0;
    font-family: 'Open Sans', sans-serif;
    display: flex;
    height: 100vh;
    background-color: #f5f5f5;
  }

  /* Left Sidebar (Branding) */
  .sidebar {
    flex: 1;
    background: linear-gradient(rgba(26, 35, 126, 0.9), rgba(26, 35, 126, 0.9)), 
                url('https://images.unsplash.com/photo-1541339907198-e08756ebafe3?auto=format&fit=crop&w=1000&q=80');
    background-size: cover;
    background-position: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    padding: 40px;
    text-align: center;
  }

  @media (max-width: 768px) {
    .sidebar { display: none; }
  }

  .sidebar h1 { font-size: 2.5rem; margin-bottom: 10px; border-bottom: 3px solid var(--dsi-gold); padding-bottom: 10px; }
  .sidebar p { font-size: 1.1rem; opacity: 0.9; }

  /* Right Login Section */
  .login-section {
    width: 450px;
    background: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px;
    box-shadow: -10px 0 20px rgba(0,0,0,0.05);
  }

  @media (max-width: 768px) {
    .login-section { width: 100%; padding: 40px; }
  }

  .logo { width: 120px; margin-bottom: 30px; }
  h2 { color: var(--dsi-navy); margin-bottom: 5px; font-weight: 700; }
  .sub-txt { color: var(--text-light); margin-bottom: 30px; font-size: 0.9rem; }

  /* UMS Style Form */
  .form-group { margin-bottom: 20px; position: relative; }
  label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--dsi-navy); margin-bottom: 8px; }
  
  input {
    width: 100%;
    padding: 12px 15px;
    border: 1px solid var(--border-color);
    border-radius: 4px;
    font-size: 1rem;
    box-sizing: border-box;
    transition: border-color 0.3s;
  }

  input:focus {
    outline: none;
    border-color: var(--dsi-navy);
  }

  .otp-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
  .otp-input { text-align: center; font-weight: bold; font-size: 1.2rem; }

  .btn-primary {
    background-color: var(--dsi-navy);
    color: white;
    border: none;
    padding: 14px;
    width: 100%;
    border-radius: 4px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 10px;
    transition: background 0.3s;
  }

  .btn-primary:hover { background-color: #0d1440; }

  .footer-links {
    margin-top: 30px;
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
  }

  .footer-links a { color: var(--dsi-navy); text-decoration: none; font-weight: 600; }
  .footer-links a:hover { text-decoration: underline; }

  .hidden { display: none; }
  .fade-in { animation: fadeIn 0.5s ease-in; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

  <div class="sidebar">
    <h1>CSA UMS</h1>
    <p>Unified Management System for Students</p>
  </div>

  <div class="login-section">
    <img class="logo" src="https://static.wixstatic.com/media/267f11_77128206e0c0489eb10785a4157d7504~mv2.png" alt="CSA Logo">
    
    <div id="loginForm">
      <h2>Student Login</h2>
      <p class="sub-txt">Please enter your registered mobile number to continue.</p>

      <div class="form-group">
        <label for="phone">MOBILE NUMBER</label>
        <input type="tel" id="phone" placeholder="Ex: 9876543210" maxlength="10">
      </div>

      <div id="otpArea" class="hidden fade-in">
        <label>ENTER OTP SENT TO PHONE</label>
        <div class="otp-grid">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
          <input type="text" class="otp-input" maxlength="1" inputmode="numeric">
        </div>
        <button class="btn-primary" style="margin-top: 25px;" onclick="verify()">VERIFY & SIGN IN</button>
      </div>

      <button id="nextBtn" class="btn-primary" onclick="showOTP()">NEXT</button>

      <div class="footer-links">
        <a href="#">Forgot Number?</a>
        <a href="#">Contact Support</a>
      </div>
    </div>
  </div>

<script>
  function showOTP() {
    const phone = document.getElementById('phone').value;
    if(phone.length === 10) {
      document.getElementById('nextBtn').classList.add('hidden');
      document.getElementById('otpArea').classList.remove('hidden');
      document.querySelectorAll('.otp-input')[0].focus();
    } else {
      alert("Please enter a valid 10-digit number");
    }
  }

  // Simple OTP auto-focus logic
  const inputs = document.querySelectorAll('.otp-input');
  inputs.forEach((input, i) => {
    input.addEventListener('input', () => {
      if (input.value && inputs[i+1]) inputs[i+1].focus();
    });
  });

  function verify() {
    alert("Signing into UMS Portal...");
    window.location.href = "/dashboard";
  }
</script>

</body>
</html>
