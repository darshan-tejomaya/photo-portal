<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSI Photo Portal | Student Login</title>
    <style>
        :root {
            --dsi-blue: #004a99;
            --dsi-light-blue: #f0f7ff;
            --dsi-border: #d1d5db;
            --text-dark: #1f2937;
            --error-red: #dc2626;
            --success-green: #059669;
        }

        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: #f3f4f6;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dark);
        }

        .login-card {
            width: 380px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border-top: 6px solid var(--dsi-blue);
            padding: 40px;
            text-align: center;
            position: relative;
        }

        /* Honeypot - Anti-Bot */
        .hp { position: absolute; left: -5000px; top: -5000px; }

        .logo {
            width: 160px;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 1.4rem;
            margin: 0 0 10px;
            color: var(--dsi-blue);
            font-weight: 700;
        }

        p {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 30px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #4b5563;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="tel"], input[type="text"] {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--dsi-border);
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--dsi-blue);
            box-shadow: 0 0 0 3px rgba(0, 74, 153, 0.1);
        }

        .message-area {
            min-height: 24px;
            margin-bottom: 15px;
            font-size: 13px;
            font-weight: 500;
        }
        .error { color: var(--error-red); }
        .success { color: var(--success-green); }
        .name { color: var(--dsi-blue); font-weight: 700; }

        .otp-container {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin: 20px 0;
        }

        .otp-box {
            width: 55px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            border: 2px solid var(--dsi-border);
            border-radius: 8px;
            background: var(--dsi-light-blue);
            color: var(--dsi-blue);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--dsi-blue);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover:not(:disabled) {
            background-color: #003d7a;
        }

        button:active:not(:disabled) {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        #resendBtn {
            background: none;
            color: #6b7280;
            font-size: 12px;
            padding: 5px;
            margin-top: 10px;
        }

        .footer-note {
            margin-top: 30px;
            font-size: 10px;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hidden { display: none; }
        
        /* Shake animation for errors */
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>

<div class="login-card" id="card">
    <input type="text" class="hp" id="honeypot" tabindex="-1" autocomplete="off">
    
    <img class="logo" src="https://static.wixstatic.com/media/267f11_77128206e0c0489eb10785a4157d7504~mv2.png" alt="Portal Logo">
    <h2>Student Portal</h2>
    <p>Authentication Required</p>

    <div class="input-group">
        <label>Registered Mobile Number</label>
        <input type="tel" id="phone" placeholder="Enter 10 digit number" maxlength="10" inputmode="numeric" autocomplete="one-time-code">
    </div>

    <div id="message" class="message-area"></div>

    <div id="otpSection" class="hidden">
        <label>Verification Code</label>
        <div class="otp-container">
            <input class="otp-box" maxlength="1" type="text" inputmode="numeric" autocomplete="one-time-code">
            <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
            <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
            <input class="otp-box" maxlength="1" type="text" inputmode="numeric">
        </div>
        <button id="verifyBtn" onclick="verifyOTP()">VERIFY & SIGN IN</button>
        <button id="resendBtn" disabled onclick="resendOTP()">Resend available in 60s</button>
    </div>

    <div class="footer-note">
        &copy; 2026 Secured Student Information System
    </div>
</div>

<script>
    let currentPhone = "";
    let resendInterval;
    let otpSent = false;
    let debounceTimer;

    const phoneInput = document.getElementById("phone");
    const otpBoxes = document.querySelectorAll(".otp-box");
    const card = document.getElementById("card");

    // 1. WebOTP API Support
    if ('OTPCredential' in window) {
        window.addEventListener('DOMContentLoaded', e => {
            const ac = new AbortController();
            navigator.credentials.get({
                otp: { transport:['sms'] },
                signal: ac.signal
            }).then(otp => {
                const code = otp.code;
                code.split('').forEach((char, i) => { if(otpBoxes[i]) otpBoxes[i].value = char; });
                verifyOTP();
            }).catch(err => console.log(err));
        });
    }

    // 2. Phone Input logic with Debounce
    phoneInput.addEventListener('input', () => {
        clearTimeout(debounceTimer);
        const val = phoneInput.value.replace(/\D/g, ''); 
        phoneInput.value = val;
        setMessage("");

        if (val.length === 10) {
            debounceTimer = setTimeout(() => {
                if(document.getElementById("honeypot").value !== "") return;
                autoCheck(val);
            }, 600);
        }
    });

    async function autoCheck(phone) {
        currentPhone = phone;
        try {
            let res = await fetch("/get-student", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ phone })
            });

            if (res.ok) {
                let data = await res.json();
                setMessage(`Welcome, ${data.name}`, "name");
                if (!otpSent) sendOTP();
            } else {
                setMessage("Student record not found", "error");
                triggerShake();
            }
        } catch (e) {
            setMessage("Connection error. Try again.", "error");
        }
    }

    async function sendOTP() {
        otpSent = true;
        try {
            let res = await fetch("/send-otp", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ phone: currentPhone })
            });

            if (res.ok) {
                document.getElementById("otpSection").classList.remove("hidden");
                otpBoxes[0].focus();
                startTimer();
            }
        } catch (e) {
            console.error("OTP send failed");
        }
    }

    function startTimer() {
        clearInterval(resendInterval);
        let time = 60;
        const btn = document.getElementById("resendBtn");
        btn.disabled = true;
        resendInterval = setInterval(() => {
            time--;
            btn.innerText = `Resend available in ${time}s`;
            if (time <= 0) {
                clearInterval(resendInterval);
                btn.disabled = false;
                btn.innerText = "Resend OTP";
            }
        }, 1000);
    }

    // 3. OTP Navigation & Auto-submit
    otpBoxes.forEach((input, i) => {
        input.addEventListener("input", () => {
            if (input.value && otpBoxes[i + 1]) {
                otpBoxes[i + 1].focus();
            }
            const allFilled = Array.from(otpBoxes).every(box => box.value.length === 1);
            if (allFilled) verifyOTP();
        });

        input.addEventListener("keydown", (e) => {
            if (e.key === "Backspace" && !input.value && otpBoxes[i - 1]) {
                otpBoxes[i - 1].focus();
            }
        });

        input.addEventListener("paste", (e) => {
            const data = e.clipboardData.getData("text").slice(0, 4).split("");
            data.forEach((char, idx) => { if (otpBoxes[idx]) otpBoxes[idx].value = char; });
            verifyOTP();
        });
    });

    async function verifyOTP() {
        let otp = "";
        otpBoxes.forEach(i => otp += i.value);
        if(otp.length < 4) return;

        const btn = document.getElementById("verifyBtn");
        const originalText = btn.innerText;
        btn.innerText = "AUTHENTICATING...";
        btn.disabled = true;

        try {
            let res = await fetch("/verify-otp", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ phone: currentPhone, otp })
            });

            let data = await res.json();

            if (data.success) {
                setMessage("Access Granted ✓", "success");
                setTimeout(() => { window.location.href = data.link; }, 800);
            } else {
                setMessage("Invalid code. Please check again.", "error");
                triggerShake();
                btn.innerText = originalText;
                btn.disabled = false;
                otpBoxes.forEach(b => b.value = "");
                otpBoxes[0].focus();
            }
        } catch (e) {
            btn.disabled = false;
            btn.innerText = originalText;
        }
    }

    function resendOTP() {
        otpSent = false;
        sendOTP();
    }

    function setMessage(msg, type="") {
        const el = document.getElementById("message");
        el.innerText = msg;
        el.className = "message-area " + type;
    }

    function triggerShake() {
        card.classList.add("shake");
        setTimeout(() => card.classList.remove("shake"), 400);
    }
</script>

</body>
</html>
